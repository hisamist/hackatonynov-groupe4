<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TechCorp AI — Chatbot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --surface: #14161f;
    --surface2: #1b1e2b;
    --surface3: #232739;
    --border: #272b3d;
    --accent: #4f8cff;
    --accent-dim: #2f5dc7;
    --green: #34c98c;
    --red: #f0584f;
    --text: #e7eaf3;
    --text-muted: #8993ab;
    --text-faint: #545b71;
    --user-bubble: #1c3358;
    --user-border: rgba(79,140,255,0.35);
    --assistant-bubble: #181b27;
    --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    --radius: 12px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ── Header ───────────────────────────────────────────── */
  .wbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .wbar .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
  }
  .wbar .titles { line-height: 1.2; flex: 1; min-width: 0; }
  .wbar .titles strong { font-size: 13.5px; }
  .wbar .titles small { display: block; color: var(--text-muted); font-size: 11px; }
  .wbar .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); }
  .dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(52,201,140,0.18); }
  .dot.disconnected { background: var(--red); }
  .dot.checking { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* ── Messages ─────────────────────────────────────────── */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 16px 14px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .welcome { margin: auto 0; text-align: center; padding: 20px 6px; color: var(--text-muted); }
  .welcome-icon {
    width: 44px; height: 44px; margin: 0 auto 12px;
    border-radius: 12px; background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 22px; color: var(--accent);
  }
  .welcome h2 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .welcome p { font-size: 12.5px; line-height: 1.5; }
  .suggestions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .suggestion-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 10px; font-size: 12.5px; cursor: pointer;
    text-align: left; transition: border-color .15s, background .15s;
  }
  .suggestion-btn:hover { border-color: var(--accent); background: var(--surface3); }

  .message { display: flex; gap: 9px; max-width: 100%; }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; letter-spacing: .3px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
  }
  .message.user .avatar { background: var(--user-bubble); border-color: var(--user-border); color: #cfe0ff; }
  .msg-col { display: flex; flex-direction: column; gap: 3px; min-width: 0; max-width: 84%; }
  .message.user .msg-col { align-items: flex-end; }
  .bubble {
    background: var(--assistant-bubble); border: 1px solid var(--border);
    padding: 9px 12px; border-radius: var(--radius); font-size: 13px; line-height: 1.55;
    word-wrap: break-word; overflow-wrap: anywhere;
  }
  .message.user .bubble { background: var(--user-bubble); border-color: var(--user-border); }
  .bubble p { margin: 0 0 8px; } .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 4px 0 8px 18px; } .bubble li { margin: 2px 0; }
  .bubble code { font-family: var(--font-mono); font-size: 12px; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 5px; }
  .bubble pre { background: #0a0c12; border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 6px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble.thinking { display: flex; gap: 4px; align-items: center; }
  .thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .thinking-dot:nth-child(2) { animation-delay: .2s; } .thinking-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }
  .cursor { display: inline-block; width: 7px; height: 14px; background: var(--accent); margin-left: 2px; vertical-align: text-bottom; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .msg-meta { display: flex; gap: 8px; align-items: center; font-size: 10px; color: var(--text-faint); padding: 0 2px; }
  .copy-btn { background: none; border: none; color: var(--text-faint); font-size: 10px; cursor: pointer; padding: 0; }
  .copy-btn:hover { color: var(--accent); }
  .error-msg { color: var(--red); font-size: 12.5px; }

  /* ── Input ────────────────────────────────────────────── */
  .input-wrap { padding: 10px 12px 12px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 6px 6px 12px; transition: border-color .15s; }
  .input-row:focus-within { border-color: var(--accent); }
  #userInput { flex: 1; background: none; border: none; color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5; resize: none; max-height: 120px; padding: 4px 0; }
  #userInput:focus { outline: none; }
  #userInput::placeholder { color: var(--text-faint); }
  #sendBtn { width: 32px; height: 32px; flex-shrink: 0; border: none; border-radius: 9px; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  #sendBtn:hover:not(:disabled) { background: var(--accent-dim); }
  #sendBtn:disabled { opacity: .5; cursor: not-allowed; }
  .input-hint { font-size: 10px; color: var(--text-faint); margin-top: 6px; text-align: center; }

  #messages::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
</style>
</head>
<body>

<div class="wbar">
  <div class="logo">P</div>
  <div class="titles">
    <strong>Assistant Financier</strong>
    <small>TechCorp AI · Phi-3.5</small>
  </div>
  <div class="status">
    <span class="dot checking" id="statusDot"></span>
    <span id="statusText">Vérification…</span>
  </div>
</div>

<div id="messages"></div>

<div class="input-wrap">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Posez votre question financière…"></textarea>
    <button id="sendBtn" title="Envoyer (Entrée)" aria-label="Envoyer le message">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
  <p class="input-hint">Entrée pour envoyer · Maj+Entrée pour une nouvelle ligne</p>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  const DEFAULT_MODEL = "{{ model_name }}";
  let currentModel = DEFAULT_MODEL;
  let messages = [];          // single in-memory thread: [{role, content}]
  let isStreaming = false;

  // ── Markdown (no deps) — same renderer as the full chat ──────────
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function renderMarkdown(src) {
    let text = escapeHtml(src);
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/(?:^|\n)((?:[-*] .*(?:\n|$))+)/g, (m, block) => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[-*]\s/, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    text = text.replace(/(?:^|\n)((?:\d+\. .*(?:\n|$))+)/g, (m, block) => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s/, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    text = text.split(/\n{2,}/).map(p => /^<(ul|ol|pre)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return text;
  }
  function timeNow() { return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }

  // ── Welcome screen ──────────────────────────────────────────────
  function renderWelcome() {
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">§</div>
        <h2>Assistant Financier</h2>
        <p>Posez une question sur la finance, l'investissement ou l'analyse économique.</p>
        <div class="suggestions">
          <button class="suggestion-btn" data-q="Explique-moi les ETF et leurs avantages">Explique-moi les ETF et leurs avantages</button>
          <button class="suggestion-btn" data-q="Comment diversifier un portefeuille ?">Comment diversifier un portefeuille ?</button>
          <button class="suggestion-btn" data-q="Qu'est-ce que le PER et comment l'interpréter ?">Qu'est-ce que le PER et comment l'interpréter ?</button>
        </div>
      </div>`;
    messagesEl.querySelectorAll('.suggestion-btn').forEach(b => {
      b.addEventListener('click', () => { inputEl.value = b.dataset.q; sendMessage(); });
    });
  }

  // ── Send message — same SSE streaming loop as the full chat ──────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    inputEl.value = '';
    inputEl.style.height = 'auto';

    messages.push({ role: 'user', content: text });
    appendMessage('user', text);

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    const thinkingId = appendThinking();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messages, model: currentModel }),
      });

      if (!response.ok || !response.body) throw new Error('HTTP ' + response.status);

      removeThinking(thinkingId);
      const assistantMsg = appendMessage('assistant', '');
      const bubbleContent = assistantMsg.querySelector('.bubble');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bubbleContent.appendChild(cursor);

      let fullText = '';
      let sawError = false;
      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') continue;
          try {
            const obj = JSON.parse(payload);
            if (obj.error) {
              sawError = true;
              bubbleContent.innerHTML = `<span class="error-msg">⚠ ${escapeHtml(obj.error)}</span>`;
              continue;
            }
            if (obj.content) {
              fullText += obj.content;
              bubbleContent.innerHTML = renderMarkdown(fullText);
              bubbleContent.appendChild(cursor);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch {}
        }
      }

      cursor.remove();

      if (fullText && !sawError) {
        bubbleContent.innerHTML = renderMarkdown(fullText);
        messages.push({ role: 'assistant', content: fullText });
        attachMeta(assistantMsg, fullText);
      } else if (!fullText && !sawError) {
        bubbleContent.innerHTML = `<span class="error-msg">⚠ Le modèle n'a renvoyé aucun contenu.</span>`;
      }

    } catch (err) {
      removeThinking(thinkingId);
      const errMsg = appendMessage('assistant', '');
      errMsg.querySelector('.bubble').innerHTML =
        `<span class="error-msg">⚠ Connexion impossible au serveur d'inférence. (${escapeHtml(err.message)})</span>`;
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── DOM helpers — same as the full chat ─────────────────────────
  function appendMessage(role, content) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'VOUS' : 'P';

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'user' ? escapeHtml(content).replace(/\n/g, '<br>') : (content ? renderMarkdown(content) : '');
    col.appendChild(bubble);

    if (content) attachMetaInto(col, content, role);

    msg.appendChild(avatar);
    msg.appendChild(col);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function attachMeta(msgEl, content) {
    attachMetaInto(msgEl.querySelector('.msg-col'), content, 'assistant');
  }

  function attachMetaInto(col, content, role) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const time = document.createElement('span');
    time.textContent = timeNow();
    meta.appendChild(time);
    if (role === 'assistant') {
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'copier';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(content);
        copyBtn.textContent = 'copié';
        setTimeout(() => copyBtn.textContent = 'copier', 1200);
      };
      meta.appendChild(copyBtn);
    }
    col.appendChild(meta);
  }

  function appendThinking() {
    const id = 'think-' + Date.now();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = id;
    msg.innerHTML = `
      <div class="avatar">P</div>
      <div class="msg-col">
        <div class="bubble thinking">
          <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }
  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── Status check — same /models endpoint as the full chat ───────
  async function checkStatus() {
    statusDot.className = 'dot checking';
    statusText.textContent = 'Vérification…';
    try {
      const r = await fetch('/models');
      const data = await r.json();
      if (data.status === 'connected') {
        statusDot.className = 'dot connected';
        statusText.textContent = 'Connecté';
        if (data.models && data.models.length && !data.models.includes(currentModel)) {
          currentModel = data.models[0];
        }
      } else {
        statusDot.className = 'dot disconnected';
        statusText.textContent = 'Déconnecté';
      }
    } catch {
      statusDot.className = 'dot disconnected';
      statusText.textContent = 'Erreur connexion';
    }
  }

  // ── Init ────────────────────────────────────────────────────────
  renderWelcome();
  checkStatus();
  setInterval(checkStatus, 15000);
  inputEl.focus();
</script>
</body>
</html>
