<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechCorp AI — Assistant Financier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222635;
      --border: #2e3347;
      --accent: #3b82f6;
      --accent-dim: #1d4ed8;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --user-bubble: #1e3a5f;
      --assistant-bubble: #1e2235;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .brand h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .brand p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Model selector */
    .model-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .model-select-wrap label {
      font-size: 12px;
      color: var(--text-muted);
    }

    select#modelSelect {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    select#modelSelect:focus {
      border-color: var(--accent);
    }

    /* Status dot */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.disconnected { background: var(--red); }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-size: 20px;
      color: var(--text);
    }

    .welcome p {
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      background: rgba(59,130,246,0.1);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 12px;
      max-width: 860px;
      width: 100%;
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message.user .avatar {
      background: var(--accent-dim);
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, var(--accent), var(--green));
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 52px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(59,130,246,0.3);
      border-top-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .bubble .error-msg {
      color: var(--red);
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }

    .thinking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
      align-items: flex-end;
    }

    textarea#userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 160px;
      min-height: 44px;
      transition: border-color 0.2s;
      overflow-y: auto;
    }

    textarea#userInput:focus {
      border-color: var(--accent);
    }

    textarea#userInput::placeholder {
      color: var(--text-muted);
    }

    button#sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      height: 44px;
      width: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    button#sendBtn:hover:not(:disabled) { background: var(--accent-dim); }
    button#sendBtn:active:not(:disabled) { transform: scale(0.96); }
    button#sendBtn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">💹</div>
    <div class="brand">
      <h1>TechCorp AI</h1>
      <p>Assistant Financier — Phi-3.5</p>
    </div>
  </div>
  <div class="header-right">
    <div class="model-select-wrap">
      <label for="modelSelect">Modèle</label>
      <select id="modelSelect">
        <option value="{{ model_name }}">{{ model_name }}</option>
      </select>
    </div>
    <div class="status-badge">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Vérification...</span>
    </div>
    <button class="btn-clear" onclick="clearChat()">Effacer</button>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">💹</div>
    <h2>Bonjour, je suis votre Assistant Financier</h2>
    <p>Je suis spécialisé en finance, investissements, trading et analyse économique. Posez-moi vos questions !</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Explique-moi les ETF</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Comment diversifier un portefeuille ?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Qu'est-ce que le PER ?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Analyse du marché boursier</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="userInput"
      placeholder="Posez votre question financière..."
      rows="1"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Envoyer (Entrée)">&#9658;</button>
  </div>
  <p class="input-hint">Entrée pour envoyer &nbsp;·&nbsp; Maj+Entrée pour sauter une ligne</p>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const modelSel   = document.getElementById('modelSelect');

  let history = [];   // [{role, content}, ...]
  let isStreaming = false;

  // ── Status check ──────────────────────────────────────────────
  async function checkStatus() {
    try {
      const r = await fetch('/models');
      const data = await r.json();
      if (data.status === 'connected') {
        statusDot.className = 'dot connected';
        statusText.textContent = 'Ollama connecté';
        // populate model list
        const current = modelSel.value;
        modelSel.innerHTML = '';
        (data.models.length ? data.models : ['{{ model_name }}']).forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          if (m === current) opt.selected = true;
          modelSel.appendChild(opt);
        });
      } else {
        statusDot.className = 'dot disconnected';
        statusText.textContent = 'Ollama déconnecté';
      }
    } catch {
      statusDot.className = 'dot disconnected';
      statusText.textContent = 'Erreur connexion';
    }
  }

  checkStatus();
  setInterval(checkStatus, 15000);

  // ── Auto-resize textarea ───────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Send message ───────────────────────────────────────────────
  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    // Hide welcome screen on first message
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Append user message
    history.push({ role: 'user', content: text });
    appendMessage('user', text);

    // Disable input
    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    // Show thinking indicator
    const thinkingId = appendThinking();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, model: modelSel.value }),
      });

      removeThinking(thinkingId);
      const assistantBubble = appendMessage('assistant', '');
      const bubbleContent = assistantBubble.querySelector('.bubble');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bubbleContent.appendChild(cursor);

      let fullText = '';
      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') break;

          try {
            const obj = JSON.parse(payload);
            if (obj.error) {
              bubbleContent.innerHTML = `<span class="error-msg">⚠️ ${obj.error}</span>`;
              break;
            }
            if (obj.content) {
              fullText += obj.content;
              // render content before cursor
              const tempDiv = document.createElement('div');
              tempDiv.textContent = fullText;
              bubbleContent.textContent = fullText;
              bubbleContent.appendChild(cursor);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch {}
        }
      }

      cursor.remove();
      if (fullText) {
        history.push({ role: 'assistant', content: fullText });
      }

    } catch (err) {
      removeThinking(thinkingId);
      const bubble = appendMessage('assistant', '');
      bubble.querySelector('.bubble').innerHTML = `<span class="error-msg">⚠️ Erreur: ${err.message}</span>`;
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  // ── DOM helpers ────────────────────────────────────────────────
  function appendMessage(role, content) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${escapeHtml(content)}</div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function appendThinking() {
    const id = 'think-' + Date.now();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = id;
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble thinking">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">💹</div>
        <h2>Bonjour, je suis votre Assistant Financier</h2>
        <p>Je suis spécialisé en finance, investissements, trading et analyse économique. Posez-moi vos questions !</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Explique-moi les ETF</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Comment diversifier un portefeuille ?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Qu'est-ce que le PER ?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Analyse du marché boursier</button>
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
