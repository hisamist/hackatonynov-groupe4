<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TechCorp AI — Assistant Financier</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --bg-grid: rgba(255,255,255,0.025);
    --surface: #14161f;
    --surface2: #1b1e2b;
    --surface3: #232739;
    --border: #272b3d;

    --accent: #4f8cff;
    --accent-dim: #2f5dc7;
    --accent-soft: rgba(79,140,255,0.12);

    --gold: #d4a72c;
    --green: #34c98c;
    --red: #f0584f;
    --red-soft: rgba(240,88,79,0.12);

    --text: #e7eaf3;
    --text-muted: #8993ab;
    --text-faint: #545b71;

    --user-bubble: #1c3358;
    --user-border: rgba(79,140,255,0.35);
    --assistant-bubble: #181b27;

    --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;

    --radius: 12px;
    --sidebar-w: 260px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: #0f1118;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .sidebar-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--green) 130%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 14px;
    color: #0c0e14;
    flex-shrink: 0;
  }

  .sidebar-brand-text h1 {
    font-family: var(--font-serif);
    font-size: 14.5px;
    font-weight: 600;
  }
  .sidebar-brand-text p {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
  }

  .btn-new {
    width: 100%;
    background: var(--accent);
    color: #0c0e14;
    border: none;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-new:hover { background: #6fa1ff; }

  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .conv-list::-webkit-scrollbar { width: 6px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .conv-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: var(--accent-soft); border-color: rgba(79,140,255,0.3); }

  .conv-item-text { min-width: 0; flex: 1; }
  .conv-title {
    font-size: 12.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .conv-item.active .conv-title { color: #fff; font-weight: 600; }
  .conv-meta {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-faint);
  }

  .conv-delete {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
  }
  .conv-item:hover .conv-delete { opacity: 1; }
  .conv-delete:hover { color: var(--red); }

  .conv-empty {
    padding: 24px 14px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.6;
  }

  .sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
  }

  /* ── Main column ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-width: 0;
    background:
      linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0 / 100% 28px,
      var(--bg);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 26px;
    background: linear-gradient(180deg, var(--surface), #111319);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .model-select-wrap { display: flex; align-items: center; gap: 7px; }
  .model-select-wrap label { font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); }

  select#modelSelect {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 9px;
    font-size: 12.5px;
    font-family: var(--font-mono);
    cursor: pointer;
    outline: none;
  }
  select#modelSelect:hover, select#modelSelect:focus { border-color: var(--accent); }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); transition: background 0.3s, box-shadow 0.3s; flex-shrink: 0; }
  .dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(52,201,140,0.18); }
  .dot.disconnected { background: var(--red); box-shadow: 0 0 0 3px var(--red-soft); }
  .dot.checking { background: var(--gold); animation: pulse 1.3s infinite ease-in-out; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .current-title {
    font-size: 13.5px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 7px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    color: var(--text-muted);
    max-width: 480px;
    margin: 0 auto;
  }

  .welcome-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent-soft), rgba(52,201,140,0.1));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif); font-size: 26px; font-weight: 700; color: var(--accent);
    margin-bottom: 4px;
  }
  .welcome h2 { font-family: var(--font-serif); font-size: 21px; font-weight: 600; color: var(--text); }
  .welcome p { font-size: 13.5px; line-height: 1.65; }

  .suggestions { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 6px; }
  .suggestion-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 9px; padding: 10px 14px; font-size: 13px; text-align: left; cursor: pointer; transition: all 0.15s;
  }
  .suggestion-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateX(2px); }

  .message { display: flex; gap: 12px; max-width: 820px; width: 100%; align-self: flex-start; margin: 0 auto; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; margin: 0 0 0 auto; }

  .avatar {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; margin-top: 2px;
  }
  .message.user .avatar { background: var(--surface3); color: var(--accent); border: 1px solid var(--user-border); }
  .message.assistant .avatar { background: linear-gradient(135deg, var(--accent), var(--green)); color: #0c0e14; }

  .msg-col { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .message.user .msg-col { align-items: flex-end; }

  .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; max-width: 100%; word-break: break-word; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid var(--user-border); border-top-right-radius: 4px; color: #eaf1ff; }
  .message.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }

  .bubble p { margin: 0 0 9px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 700; color: #fff; }
  .bubble code { font-family: var(--font-mono); background: rgba(255,255,255,0.07); padding: 1.5px 6px; border-radius: 5px; font-size: 12.5px; }
  .bubble pre { background: #0a0c12; border: 1px solid var(--border); padding: 11px 13px; border-radius: 9px; overflow-x: auto; font-family: var(--font-mono); font-size: 12.5px; margin: 9px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble ul, .bubble ol { margin: 7px 0; padding-left: 20px; }
  .bubble li { margin-bottom: 4px; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 9px 0; font-size: 12.5px; }
  .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 9px; text-align: left; }
  .bubble .error-msg { color: var(--red); display: flex; align-items: flex-start; gap: 8px; }

  .msg-meta { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); padding: 0 4px; }
  .copy-btn { background: none; border: none; color: var(--text-faint); font-family: var(--font-mono); font-size: 10.5px; cursor: pointer; text-decoration: underline; padding: 0; }
  .copy-btn:hover { color: var(--accent); }

  .cursor { display: inline-block; width: 2px; height: 14px; background: var(--accent); margin-left: 2px; vertical-align: middle; animation: blink 0.85s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .thinking { display: flex; align-items: center; gap: 5px; padding: 13px 16px; }
  .thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .thinking-dot:nth-child(2) { animation-delay: 0.15s; }
  .thinking-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }

  .input-area { border-top: 1px solid var(--border); background: linear-gradient(180deg, #111319, var(--surface)); padding: 16px 24px; flex-shrink: 0; }
  .input-wrapper {
    display: flex; gap: 10px; max-width: 820px; margin: 0 auto; align-items: flex-end;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 7px 7px 15px;
    transition: border-color 0.15s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }

  textarea#userInput {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.5; padding: 8px 0;
    resize: none; outline: none; max-height: 160px; min-height: 24px; overflow-y: auto;
  }
  textarea#userInput::placeholder { color: var(--text-faint); }

  button#sendBtn {
    background: var(--accent); border: none; border-radius: 9px; color: #0c0e14; cursor: pointer;
    height: 38px; width: 38px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  button#sendBtn:hover:not(:disabled) { background: #6fa1ff; }
  button#sendBtn:active:not(:disabled) { transform: scale(0.94); }
  button#sendBtn:disabled { background: var(--surface3); color: var(--text-faint); cursor: not-allowed; }

  .input-hint { text-align: center; font-size: 11px; font-family: var(--font-mono); color: var(--text-faint); margin-top: 9px; max-width: 820px; margin-left: auto; margin-right: auto; }

  @media (max-width: 760px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(-100%); transition: transform 0.2s; }
    .sidebar.open { transform: translateX(0); }
    .menu-toggle { display: flex !important; }
  }
  .menu-toggle {
    display: none; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    width: 32px; height: 32px; border-radius: 7px; align-items: center; justify-content: center; cursor: pointer;
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="logo">P</div>
      <div class="sidebar-brand-text">
        <h1>TechCorp AI</h1>
        <p>ASSISTANT FINANCIER</p>
      </div>
    </div>
    <button class="btn-new" id="newConvBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Nouvelle conversation
    </button>
  </div>
  <nav class="conv-list" id="convList" aria-label="Historique des conversations"></nav>
  <div class="sidebar-footer">Phi-3.5 · localStorage</div>
</aside>

<div class="main">
  <header>
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-toggle" id="menuToggle" aria-label="Afficher l'historique">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <span class="current-title" id="currentTitle">Nouvelle conversation</span>
    </div>
    <div class="header-right">
      <div class="model-select-wrap">
        <label for="modelSelect">Modèle</label>
        <select id="modelSelect">
          <option value="{{ model_name }}">{{ model_name }}</option>
        </select>
      </div>
      <div class="status-badge">
        <div class="dot checking" id="statusDot"></div>
        <span id="statusText">Vérification…</span>
      </div>
    </div>
  </header>

  <div id="messages" aria-live="polite"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="Posez votre question financière…" rows="1" aria-label="Message à envoyer"></textarea>
      <button id="sendBtn" title="Envoyer (Entrée)" aria-label="Envoyer le message">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
    <p class="input-hint">Entrée pour envoyer · Maj+Entrée pour une nouvelle ligne</p>
  </div>
</div>

<script>
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('userInput');
  const sendBtn      = document.getElementById('sendBtn');
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const modelSel     = document.getElementById('modelSelect');
  const convListEl   = document.getElementById('convList');
  const newConvBtn   = document.getElementById('newConvBtn');
  const currentTitle = document.getElementById('currentTitle');
  const sidebar      = document.getElementById('sidebar');
  const menuToggle    = document.getElementById('menuToggle');

  const STORAGE_KEY = 'techcorp_conversations_v1';
  let conversations = loadConversations();   // [{id, title, messages: [{role, content}], updatedAt}]
  let activeId = conversations.length ? conversations[0].id : null;
  let isStreaming = false;

  // ── Storage ───────────────────────────────────────────────────
  function loadConversations() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }
  function saveConversations() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations)); } catch {}
  }
  function getActive() {
    return conversations.find(c => c.id === activeId) || null;
  }

  // ── Markdown (no deps) ───────────────────────────────────────
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function renderMarkdown(src) {
    let text = escapeHtml(src);
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/(?:^|\n)((?:[-*] .*(?:\n|$))+)/g, (m, block) => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[-*]\s/, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    text = text.replace(/(?:^|\n)((?:\d+\. .*(?:\n|$))+)/g, (m, block) => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s/, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    text = text.split(/\n{2,}/).map(p => /^<(ul|ol|pre)/.test(p.trim()) ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return text;
  }
  function timeNow() { return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
  function relativeDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    return sameDay ? d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
                   : d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
  }

  // ── Sidebar rendering ────────────────────────────────────────
  function renderSidebar() {
    convListEl.innerHTML = '';
    if (!conversations.length) {
      convListEl.innerHTML = `<div class="conv-empty">Aucune conversation pour l'instant.<br>Posez une question pour commencer.</div>`;
      return;
    }
    const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
    sorted.forEach(conv => {
      const item = document.createElement('div');
      item.className = 'conv-item' + (conv.id === activeId ? ' active' : '');
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.innerHTML = `
        <div class="conv-item-text">
          <div class="conv-title">${escapeHtml(conv.title || 'Nouvelle conversation')}</div>
          <div class="conv-meta">${relativeDate(conv.updatedAt)} · ${conv.messages.length} msg</div>
        </div>
        <button class="conv-delete" title="Supprimer" aria-label="Supprimer la conversation">✕</button>
      `;
      item.addEventListener('click', (e) => {
        if (e.target.closest('.conv-delete')) return;
        switchConversation(conv.id);
      });
      item.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') switchConversation(conv.id);
      });
      item.querySelector('.conv-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteConversation(conv.id);
      });
      convListEl.appendChild(item);
    });
  }

  function switchConversation(id) {
    activeId = id;
    renderSidebar();
    renderMessages();
    if (window.innerWidth <= 760) sidebar.classList.remove('open');
  }

  function deleteConversation(id) {
    conversations = conversations.filter(c => c.id !== id);
    if (activeId === id) {
      activeId = conversations.length ? conversations[0].id : null;
    }
    saveConversations();
    renderSidebar();
    renderMessages();
  }

  function createConversation() {
    const conv = { id: 'c_' + Date.now(), title: '', messages: [], updatedAt: Date.now() };
    conversations.unshift(conv);
    activeId = conv.id;
    saveConversations();
    renderSidebar();
    renderMessages();
    inputEl.focus();
  }

  newConvBtn.addEventListener('click', createConversation);
  menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

  // ── Messages rendering ───────────────────────────────────────
  function renderMessages() {
    messagesEl.innerHTML = '';
    const conv = getActive();
    currentTitle.textContent = conv ? (conv.title || 'Nouvelle conversation') : 'Nouvelle conversation';

    if (!conv || conv.messages.length === 0) {
      messagesEl.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="welcome-icon">§</div>
          <h2>Assistant Financier</h2>
          <p>Spécialisé en finance, investissement et analyse économique. La connexion au modèle Phi-3.5 est gérée automatiquement — posez votre question pour commencer.</p>
          <div class="suggestions">
            <button class="suggestion-btn" data-q="Explique-moi les ETF et leurs avantages">Explique-moi les ETF et leurs avantages</button>
            <button class="suggestion-btn" data-q="Comment diversifier un portefeuille ?">Comment diversifier un portefeuille ?</button>
            <button class="suggestion-btn" data-q="Qu'est-ce que le PER et comment l'interpréter ?">Qu'est-ce que le PER et comment l'interpréter ?</button>
            <button class="suggestion-btn" data-q="Résume les indicateurs clés d'un bilan comptable">Résume les indicateurs clés d'un bilan comptable</button>
          </div>
        </div>`;
      messagesEl.querySelectorAll('.suggestion-btn').forEach(b => {
        b.addEventListener('click', () => { inputEl.value = b.dataset.q; sendMessage(); });
      });
      return;
    }

    conv.messages.forEach(m => appendMessage(m.role, m.content, { skipHistory: true }));
  }

  // ── Send message ───────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    if (!getActive()) createConversation();
    const conv = getActive();

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    inputEl.value = '';
    inputEl.style.height = 'auto';

    conv.messages.push({ role: 'user', content: text });
    if (!conv.title) conv.title = text.slice(0, 48) + (text.length > 48 ? '…' : '');
    conv.updatedAt = Date.now();
    saveConversations();
    renderSidebar();
    appendMessage('user', text, { skipHistory: true });

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    const thinkingId = appendThinking();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conv.messages, model: modelSel.value }),
      });

      if (!response.ok || !response.body) throw new Error('HTTP ' + response.status);

      removeThinking(thinkingId);
      const assistantMsg = appendMessage('assistant', '', { skipHistory: true, streaming: true });
      const bubbleContent = assistantMsg.querySelector('.bubble');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bubbleContent.appendChild(cursor);

      let fullText = '';
      let sawError = false;
      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') continue;
          try {
            const obj = JSON.parse(payload);
            if (obj.error) {
              sawError = true;
              bubbleContent.innerHTML = `<span class="error-msg">⚠ ${escapeHtml(obj.error)}</span>`;
              continue;
            }
            if (obj.content) {
              fullText += obj.content;
              bubbleContent.innerHTML = renderMarkdown(fullText);
              bubbleContent.appendChild(cursor);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch {}
        }
      }

      cursor.remove();

      if (fullText && !sawError) {
        bubbleContent.innerHTML = renderMarkdown(fullText);
        conv.messages.push({ role: 'assistant', content: fullText });
        conv.updatedAt = Date.now();
        saveConversations();
        renderSidebar();
        attachMeta(assistantMsg, fullText);
      } else if (!fullText && !sawError) {
        bubbleContent.innerHTML = `<span class="error-msg">⚠ Le modèle n'a renvoyé aucun contenu. Vérifiez qu'il est bien chargé.</span>`;
      }

    } catch (err) {
      removeThinking(thinkingId);
      const errMsg = appendMessage('assistant', '', { skipHistory: true });
      errMsg.querySelector('.bubble').innerHTML =
        `<span class="error-msg">⚠ Connexion impossible au serveur d'inférence. Vérifiez qu'il est démarré et réessayez. (${escapeHtml(err.message)})</span>`;
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── DOM helpers ────────────────────────────────────────────────
  function appendMessage(role, content) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'VOUS' : 'P';

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'user' ? escapeHtml(content).replace(/\n/g, '<br>') : (content ? renderMarkdown(content) : '');
    col.appendChild(bubble);

    if (content) attachMetaInto(col, content, role);

    msg.appendChild(avatar);
    msg.appendChild(col);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function attachMeta(msgEl, content) {
    attachMetaInto(msgEl.querySelector('.msg-col'), content, 'assistant');
  }

  function attachMetaInto(col, content, role) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const time = document.createElement('span');
    time.textContent = timeNow();
    meta.appendChild(time);
    if (role === 'assistant') {
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'copier';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(content);
        copyBtn.textContent = 'copié';
        setTimeout(() => copyBtn.textContent = 'copier', 1200);
      };
      meta.appendChild(copyBtn);
    }
    col.appendChild(meta);
  }

  function appendThinking() {
    const id = 'think-' + Date.now();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = id;
    msg.innerHTML = `
      <div class="avatar">P</div>
      <div class="msg-col">
        <div class="bubble thinking">
          <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }
  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── Status check ──────────────────────────────────────────────
  async function checkStatus() {
    statusDot.className = 'dot checking';
    statusText.textContent = 'Vérification…';
    try {
      const r = await fetch('/models');
      const data = await r.json();
      if (data.status === 'connected') {
        statusDot.className = 'dot connected';
        statusText.textContent = 'Connecté';
        const current = modelSel.value;
        modelSel.innerHTML = '';
        (data.models && data.models.length ? data.models : ['{{ model_name }}']).forEach(m => {
          const opt = document.createElement('option');
          opt.value = m; opt.textContent = m;
          if (m === current) opt.selected = true;
          modelSel.appendChild(opt);
        });
      } else {
        statusDot.className = 'dot disconnected';
        statusText.textContent = 'Déconnecté';
      }
    } catch {
      statusDot.className = 'dot disconnected';
      statusText.textContent = 'Erreur connexion';
    }
  }
  checkStatus();
  setInterval(checkStatus, 15000);

  // ── Init ─────────────────────────────────────────────────────
  renderSidebar();
  renderMessages();
</script>
</body>
</html>
